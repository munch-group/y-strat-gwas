[project]
name = "y-strat-gwas"
description = "SNP x Y-haplogroup interaction + cross-stratum genetic correlation"
channels = ["conda-forge", "bioconda", "gwforg"]
platforms = ["linux-64"]

[dependencies]
regenie = ">=3.4"
plink2  = "*"
python  = ">=3.10"
